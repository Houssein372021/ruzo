name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ruzo-production
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check deployment secrets
        shell: bash
        env:
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          missing=0

          if [ -z "$VPS_USER" ]; then
            echo "::error::Missing required GitHub secret: VPS_USER"
            missing=1
          fi

          if [ -z "$VPS_SSH_KEY" ]; then
            echo "::error::Missing required GitHub secret: VPS_SSH_KEY"
            missing=1
          fi

          exit "$missing"

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST || '217.154.13.95' }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e

            PROJECT_PATH="${{ secrets.VPS_PROJECT_PATH || '/opt/ruzo' }}"

            cd "$PROJECT_PATH"
            git fetch origin main
            git checkout main

            if ! git diff --quiet || ! git diff --cached --quiet; then
              echo "Local tracked changes detected on VPS. Stashing them before deployment."
              git status --short
              git stash push --message "cd-auto-stash-$(date -u +%Y%m%dT%H%M%SZ)"
            fi

            git reset --hard origin/main
            docker compose --env-file .env.production -f docker-compose.prod.yml up -d --build --remove-orphans
            docker image prune -f
